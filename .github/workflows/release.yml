name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version part to bump"
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major
      dry_run:
        description: "Dry-run (skip prod PyPI publish, skip GH release, skip push)"
        type: boolean
        required: false
        default: false

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run pre-commit
        run: uv run pre-commit run --all-files --show-diff-on-failure

      - name: Run tests (coverage gate enforced via pyproject)
        run: uv run pytest

  release:
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    env:
      BUMP: ${{ inputs.bump }}
      DRY_RUN: ${{ inputs.dry_run }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          uv run bump-my-version bump "$BUMP"
          NEW_VERSION="$(uv run bump-my-version show current_version)"
          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build distributions
        run: |
          rm -rf dist
          uv build

      - name: Publish to PyPI (trusted publishing via OIDC)
        if: ${{ inputs.dry_run == false }}
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Push bump commit and tag
        if: ${{ inputs.dry_run == false }}
        env:
          TAG: ${{ steps.bump.outputs.tag }}
        run: |
          git push origin HEAD:main
          git push origin "refs/tags/${TAG}"

      - name: Create GitHub Release
        if: ${{ inputs.dry_run == false }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.bump.outputs.tag }}
          VERSION: ${{ steps.bump.outputs.new_version }}
          REPO: ${{ github.repository }}
        run: |
          NOTES_FILE="$(mktemp)"
          {
            printf '<p align="center">\n'
            printf '  <img src="https://raw.githubusercontent.com/%s/%s/assets/svg/header-release-en-us.svg" alt="release %s" width="880">\n' \
              "$REPO" "$TAG" "$VERSION"
            printf '</p>\n\n'
            printf '## v%s\n\n' "$VERSION"
            printf 'Published to PyPI: https://pypi.org/project/glory-to-protocol/%s/\n' "$VERSION"
          } > "$NOTES_FILE"
          gh release create "$TAG" \
            --title "v${VERSION}" \
            --notes-file "$NOTES_FILE" \
            dist/*
